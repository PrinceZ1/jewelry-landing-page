<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Tân Nguyên">
  <!--
    ALTERNATIVE (simpler mark — T + diamond accent, optimal for extreme 16px):
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
      <rect width="100" height="100" fill="#0D1B2A"/>
      <rect x="20" y="28" width="60" height="6" fill="#D4AF37"/>
      <rect x="42" y="28" width="16" height="44" fill="#D4AF37"/>
      <polygon points="50,10 56,16 50,22 44,16" fill="#D4AF37"/>
    </svg>
  -->

  <!-- Diamond hallmark frame — rhombus, ~8% inset from viewBox -->
  <polygon
    points="50,6 94,50 50,94 6,50"
    fill="#0D1B2A"
    stroke="#D4AF37"
    stroke-width="2.5"
    stroke-linejoin="miter"
  />

  <!-- Letter T — serif-like bar + stem, optically centered left -->
  <rect x="21" y="31" width="26" height="5.5" fill="#D4AF37" rx="0.6" />
  <rect x="31.25" y="31" width="5.5" height="35" fill="#D4AF37" rx="0.6" />

  <!-- Letter N — shared junction with T stem (ligature); diagonal as solid band -->
  <rect x="37" y="31" width="4.25" height="35" fill="#D4AF37" rx="0.5" />
  <polygon points="41.25,31 45.75,31 70.75,66 66.25,66 41.25,34.5" fill="#D4AF37" />
  <rect x="66.25" y="31" width="4.25" height="35" fill="#D4AF37" rx="0.5" />
</svg>
